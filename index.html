<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チームカレンダー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans,system-ui,sans-serif);background:var(--color-background-tertiary);color:var(--color-text-primary);min-height:100vh;}

/* ── 共通 ── */
.btn-primary{background:#185FA5;color:#E6F1FB;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:14px;font-weight:500;}
.btn-primary:hover{background:#0C447C;}
.btn-cancel{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:13px;color:var(--color-text-primary);}
.btn-cancel:hover{background:var(--color-background-secondary);}
.btn-ghost{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--color-text-primary);}
.btn-ghost:hover{background:var(--color-background-secondary);}
.error-msg{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1;border-radius:8px;padding:10px 14px;font-size:13px;margin:8px 0;}

/* ── 認証画面 ── */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.auth-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:2.5rem;text-align:center;max-width:360px;width:100%;}
.auth-card h2{font-size:18px;font-weight:500;margin-bottom:8px;}
.auth-card p{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.6;}

/* ── PC版 ── */
#pc-view{display:none;flex-direction:column;height:100vh;}
.pc-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;}
.pc-header h2{font-size:16px;font-weight:500;flex:1;}
.week-label{font-size:13px;color:var(--color-text-secondary);min-width:180px;text-align:center;}
.pc-member-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;}
.pc-member-bar label{font-size:12px;color:var(--color-text-secondary);}
.member-tag{display:inline-flex;align-items:center;gap:5px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:3px 8px 3px 4px;font-size:12px;}
.m-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;}
.m-rm{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:14px;line-height:1;padding:0 1px;}
.m-rm:hover{color:#A32D2D;}
.add-member-wrap{display:flex;gap:6px;margin-left:auto;}
.add-member-wrap input{border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:5px 9px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);width:220px;}
.pc-calendar-wrap{flex:1;overflow:auto;padding:0;}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal-table th{background:var(--color-background-secondary);font-size:12px;font-weight:500;color:var(--color-text-secondary);padding:8px 4px;text-align:center;border:0.5px solid var(--color-border-tertiary);position:sticky;top:0;z-index:2;}
.cal-table th.today-h{color:#185FA5;}
.cal-table td{border:0.5px solid var(--color-border-tertiary);padding:3px;vertical-align:top;}
.cal-table td.name-cell{font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:6px 6px;background:var(--color-background-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;z-index:1;}
.cal-table td.today-cell{background:#EEF6FF;}
.chip{border-radius:4px;padding:2px 5px;font-size:11px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;}
.chip-add{background:none;border:0.5px dashed var(--color-border-secondary);color:var(--color-text-tertiary);font-size:11px;border-radius:4px;padding:1px 4px;cursor:pointer;width:100%;text-align:left;margin-top:2px;}
.chip-add:hover{background:var(--color-background-secondary);}
.status-bar{display:flex;align-items:center;gap:6px;padding:4px 16px;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);}
.s-dot{width:7px;height:7px;border-radius:50%;}
.s-dot.ok{background:#639922;}.s-dot.loading{background:#BA7517;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── スマホ版 ── */
#sp-view{display:none;flex-direction:column;height:100vh;}
.sp-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);}
.sp-header h2{font-size:15px;font-weight:500;flex:1;}
.cal-toggle-btn{display:flex;align-items:center;gap:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text-primary);}
.mini-cal-wrap{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);overflow:hidden;max-height:0;transition:max-height 0.25s ease;}
.mini-cal-wrap.open{max-height:320px;}
.mini-cal{padding:12px 14px;}
.mini-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mini-cal-head span{font-size:14px;font-weight:500;}
.mini-cal-head button{background:none;border:none;cursor:pointer;font-size:18px;color:var(--color-text-secondary);padding:2px 6px;}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.mc-dow{font-size:11px;color:var(--color-text-tertiary);padding:2px 0;font-weight:500;}
.mc-day{font-size:13px;padding:4px 2px;border-radius:6px;cursor:pointer;position:relative;line-height:1.4;}
.mc-day:hover{background:var(--color-background-secondary);}
.mc-day.other-month{color:var(--color-text-tertiary);}
.mc-day.today{font-weight:500;color:#185FA5;}
.mc-day.selected{background:#185FA5;color:#E6F1FB!important;border-radius:6px;}
.mc-dot{width:4px;height:4px;border-radius:50%;background:#185FA5;margin:1px auto 0;display:none;}
.mc-day.has-event .mc-dot{display:block;}
.mc-day.selected .mc-dot{background:#E6F1FB;}
.sp-date-nav{display:flex;align-items:center;padding:8px 14px;gap:8px;background:var(--color-background-secondary);}
.sp-date-nav button{background:none;border:none;cursor:pointer;font-size:20px;color:var(--color-text-secondary);padding:2px 6px;}
.sp-date-nav .date-label{flex:1;text-align:center;font-size:14px;font-weight:500;}
.sp-add-btn{background:#185FA5;color:#E6F1FB;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:500;}
.sp-body{flex:1;overflow-y:auto;padding:10px 14px;}
.sp-member-block{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.sp-member-head{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);}
.sp-member-name{font-size:13px;font-weight:500;}
.sp-events{padding:6px 12px;}
.sp-event-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.sp-event-row:last-child{border-bottom:none;}
.sp-event-time{font-size:12px;color:var(--color-text-secondary);min-width:90px;padding-top:1px;}
.sp-event-title{font-size:13px;}
.sp-no-event{font-size:12px;color:var(--color-text-tertiary);padding:6px 0;}
.sp-chip-add{display:block;width:100%;text-align:center;background:none;border:0.5px dashed var(--color-border-secondary);border-radius:6px;padding:5px;font-size:12px;color:var(--color-text-tertiary);cursor:pointer;margin-top:4px;}
.sp-chip-add:hover{background:var(--color-background-secondary);}
.sp-status{text-align:center;font-size:12px;color:var(--color-text-tertiary);padding:6px 0;}

/* ── モーダル ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--color-background-primary);border-radius:12px;padding:1.5rem;width:420px;max-width:100%;border:0.5px solid var(--color-border-tertiary);max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem;}
.form-row{margin-bottom:11px;}
.form-row label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);}
.form-row textarea{height:56px;resize:vertical;}
.time-row{display:flex;gap:8px;}
.time-row>div{flex:1;}
.cb-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--color-background-secondary);border-radius:8px;margin:3px 0;font-size:13px;cursor:pointer;}
.cb-row input{width:14px;height:14px;cursor:pointer;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}

/* カラー */
.c0{background:#B5D4F4;color:#0C447C;}
.c1{background:#9FE1CB;color:#085041;}
.c2{background:#FAC775;color:#854F0B;}
.c3{background:#F5C4B3;color:#993C1D;}
.c4{background:#CECBF6;color:#3C3489;}
.c5{background:#C0DD97;color:#3B6D11;}
.c6{background:#F4C0D1;color:#72243E;}
.c7{background:#B4B2A9;color:#444441;}
.c8{background:#85B7EB;color:#042C53;}
.c9{background:#97C459;color:#173404;}
</style>
</head>
<body>

<!-- 認証 -->
<div id="auth-view" class="auth-wrap">
  <div class="auth-card">
    <h2>チームカレンダー</h2>
    <p>Googleアカウントでサインインして、チームの予定を管理します</p>
    <button class="btn-primary" id="signInBtn">Google でサインイン</button>
    <div id="auth-error" class="error-msg" style="display:none;margin-top:12px;"></div>
  </div>
</div>

<!-- PC版 -->
<div id="pc-view">
  <div class="pc-header">
    <h2>チームカレンダー</h2>
    <button class="btn-ghost" id="pc-prev">← 前週</button>
    <span class="week-label" id="pc-week-label"></span>
    <button class="btn-ghost" id="pc-next">次週 →</button>
    <button class="btn-primary" id="pc-add-btn" style="margin-left:8px;">＋ 予定追加</button>
    <button class="btn-ghost" id="pc-signout">サインアウト</button>
  </div>
  <div class="pc-member-bar">
    <label>メンバー：</label>
    <div id="pc-member-list" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    <div class="add-member-wrap">
      <input type="text" id="pc-member-input" placeholder="メールアドレスを追加" />
      <button class="btn-ghost" id="pc-member-add">追加</button>
    </div>
  </div>
  <div id="pc-error" class="error-msg" style="display:none;margin:4px 16px;"></div>
  <div class="pc-calendar-wrap">
    <table class="cal-table">
      <thead><tr id="pc-cal-head"></tr></thead>
      <tbody id="pc-cal-body"></tbody>
    </table>
  </div>
  <div class="status-bar"><div class="s-dot ok" id="pc-s-dot"></div><span id="pc-s-text">準備完了</span></div>
</div>

<!-- スマホ版 -->
<div id="sp-view">
  <div class="sp-header">
    <h2>チームカレンダー</h2>
    <button class="cal-toggle-btn" id="sp-cal-toggle">
      <span id="sp-month-label">6月</span> ▾
    </button>
    <button class="btn-ghost" id="sp-signout" style="font-size:12px;padding:5px 8px;">退出</button>
  </div>
  <div class="mini-cal-wrap" id="mini-cal-wrap">
    <div class="mini-cal">
      <div class="mini-cal-head">
        <button id="mc-prev">‹</button>
        <span id="mc-month-title"></span>
        <button id="mc-next">›</button>
      </div>
      <div class="mc-grid" id="mc-grid"></div>
    </div>
  </div>
  <div class="sp-date-nav">
    <button id="sp-prev-day">‹</button>
    <span class="date-label" id="sp-date-label"></span>
    <button id="sp-next-day">›</button>
    <button class="sp-add-btn" id="sp-add-btn">＋</button>
  </div>
  <div class="sp-body" id="sp-body"></div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" style="display:none;">
  <div class="modal">
    <h3>予定を追加</h3>
    <div class="form-row">
      <label>タイトル</label>
      <input type="text" id="evt-title" placeholder="例：定例会議" />
    </div>
    <div class="form-row">
      <label>日付</label>
      <input type="date" id="evt-date" />
    </div>
    <div class="form-row time-row">
      <div><label>開始</label><input type="time" id="evt-start" value="10:00" /></div>
      <div><label>終了</label><input type="time" id="evt-end" value="11:00" /></div>
    </div>
    <div class="form-row">
      <label>場所・メモ</label>
      <textarea id="evt-desc" placeholder="会議室、URL、備考など"></textarea>
    </div>
    <div class="form-row">
      <label>登録するカレンダー（複数選択可）</label>
      <div id="evt-cal-checks"></div>
    </div>
    <div id="modal-error" class="error-msg" style="display:none;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">キャンセル</button>
      <button class="btn-primary" id="modal-save">登録</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '239931792758-teibaqeu6reg9fvdqq8ti03dp1ml48a0.apps.googleusercontent.com';
const DISC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
const SCOPE = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/userinfo.email';
const DAYS_JP = ['日','月','火','水','木','金','土'];
const CHIP_COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7','c8','c9'];
const AV_BG = ['#B5D4F4','#9FE1CB','#FAC775','#F5C4B3','#CECBF6','#C0DD97','#F4C0D1','#B4B2A9','#85B7EB','#97C459'];
const AV_FG = ['#0C447C','#085041','#854F0B','#993C1D','#3C3489','#3B6D11','#72243E','#444441','#042C53','#173404'];

let gapiReady=false, gisReady=false, tokenClient=null;
let members=[], eventsCache={}, currentUser=null;
let weekOffset=0, selectedDate=new Date(), miniCalDate=new Date();
let isMobile=false;

function fmtDate(d){return d.toISOString().split('T')[0];}
function isToday(d){return fmtDate(d)===fmtDate(new Date());}
function colorIdx(email){return members.indexOf(email)%10;}
function chipColor(email){return CHIP_COLORS[colorIdx(email)];}

function getWeekDates(offset=0){
  const now=new Date(), day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-day+1+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function detectMobile(){
  isMobile=window.innerWidth<768||/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
}

function showView(){
  document.getElementById('auth-view').style.display='none';
  if(isMobile){
    document.getElementById('sp-view').style.display='flex';
    document.getElementById('pc-view').style.display='none';
    renderSpView();
  } else {
    document.getElementById('pc-view').style.display='flex';
    document.getElementById('sp-view').style.display='none';
    loadWeek();
  }
}

// ── GAPI ──
function initGapi(){
  gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:[DISC]});
    gapiReady=true; tryReady();
  });
}
function initGis(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPE,
    callback:(r)=>{if(r.error){showAuthError(r.error);return;} onSignedIn();}
  });
  gisReady=true; tryReady();
}
function tryReady(){
  if(gapiReady&&gisReady) document.getElementById('signInBtn').disabled=false;
}
async function onSignedIn(){
  try{
    const r=await gapi.client.request({path:'https://www.googleapis.com/oauth2/v1/userinfo'});
    currentUser=r.result.email;
    if(!members.includes(currentUser)) members.unshift(currentUser);
    detectMobile();
    showView();
  }catch(e){showAuthError('ユーザー情報の取得に失敗しました');}
}
function signOut(){
  const tok=gapi.client.getToken();
  if(tok) google.accounts.oauth2.revoke(tok.access_token,()=>{});
  gapi.client.setToken(null);
  members=[];eventsCache={};currentUser=null;weekOffset=0;selectedDate=new Date();
  document.getElementById('auth-view').style.display='flex';
  document.getElementById('pc-view').style.display='none';
  document.getElementById('sp-view').style.display='none';
}
function showAuthError(msg){
  const el=document.getElementById('auth-error');
  el.textContent=msg;el.style.display='block';
}

// ── イベント取得 ──
async function fetchEvents(emails, dates){
  const timeMin=dates[0].toISOString().replace(/T.*/,'T00:00:00+09:00');
  const timeMax=dates[dates.length-1].toISOString().replace(/T.*/,'T23:59:59+09:00');
  await Promise.all(emails.map(async email=>{
    try{
      const r=await gapi.client.calendar.events.list({
        calendarId:email,timeMin,timeMax,singleEvents:true,orderBy:'startTime',maxResults:200
      });
      eventsCache[email]=r.result.items||[];
    }catch(e){eventsCache[email]=[];}
  }));
}

function eventsForDay(email,dateStr){
  return (eventsCache[email]||[]).filter(e=>{
    const s=e.start?.date||e.start?.dateTime?.split('T')[0];
    return s===dateStr;
  });
}

function fmtTime(dt){
  if(!dt) return '終日';
  const t=dt.split('T')[1]||'';
  return t.slice(0,5);
}

// ── PC版 ──
async function loadWeek(){
  const dates=getWeekDates(weekOffset);
  renderPcHeader(dates);
  renderPcSkeleton(dates);
  setPcStatus('loading','読み込み中...');
  await fetchEvents(members,dates);
  renderPcBody(dates);
  renderPcMembers();
  setPcStatus('ok','同期済み');
}

function renderPcHeader(dates){
  const f=dates[0],l=dates[6];
  document.getElementById('pc-week-label').textContent=
    `${f.getFullYear()}年 ${f.getMonth()+1}/${f.getDate()} – ${l.getMonth()+1}/${l.getDate()}`;
  const head=document.getElementById('pc-cal-head');
  head.innerHTML=`<th style="width:88px;min-width:88px">メンバー</th>`+
    dates.map(d=>`<th class="${isToday(d)?'today-h':''}">${d.getMonth()+1}/${d.getDate()}（${DAYS_JP[d.getDay()]}）</th>`).join('');
}

function renderPcSkeleton(dates){
  document.getElementById('pc-cal-body').innerHTML=members.map(email=>{
    const name=email.split('@')[0];
    const ai=colorIdx(email);
    return `<tr>
      <td class="name-cell">
        <div style="display:flex;align-items:center;gap:5px;">
          <div class="m-avatar" style="background:${AV_BG[ai]};color:${AV_FG[ai]};width:20px;height:20px;min-width:20px;">${name.slice(0,2).toUpperCase()}</div>
          <span>${name}</span>
        </div>
      </td>
      ${dates.map(d=>`<td class="${isToday(d)?'today-cell':''}"></td>`).join('')}
    </tr>`;
  }).join('');
}

function renderPcBody(dates){
  document.getElementById('pc-cal-body').innerHTML=members.map(email=>{
    const name=email.split('@')[0];
    const ai=colorIdx(email);
    const cc=chipColor(email);
    return `<tr>
      <td class="name-cell">
        <div style="display:flex;align-items:center;gap:5px;">
          <div class="m-avatar" style="background:${AV_BG[ai]};color:${AV_FG[ai]};width:20px;height:20px;min-width:20px;">${name.slice(0,2).toUpperCase()}</div>
          <span>${name}</span>
        </div>
      </td>
      ${dates.map(d=>{
        const ds=fmtDate(d);
        const evts=eventsForDay(email,ds);
        const chips=evts.map(e=>{
          const t=e.start?.dateTime?fmtTime(e.start.dateTime)+' ':'';
          return `<div class="chip ${cc}" title="${e.summary||''}">${t}${e.summary||'（無題）'}</div>`;
        }).join('');
        return `<td class="${isToday(d)?'today-cell':''}">${chips}<button class="chip-add" onclick="openModal('${email}','${ds}')">＋</button></td>`;
      }).join('')}
    </tr>`;
  }).join('');
}

function renderPcMembers(){
  document.getElementById('pc-member-list').innerHTML=members.map((email,i)=>{
    const name=email.split('@')[0];
    const ai=i%10;
    return `<div class="member-tag">
      <div class="m-avatar" style="background:${AV_BG[ai]};color:${AV_FG[ai]}">${name.slice(0,2).toUpperCase()}</div>
      <span>${name}</span>
      ${email!==currentUser?`<button class="m-rm" onclick="removeMember('${email}')">×</button>`:''}
    </div>`;
  }).join('');
}

function setPcStatus(type,msg){
  document.getElementById('pc-s-dot').className='s-dot '+type;
  document.getElementById('pc-s-text').textContent=msg;
}

function showPcError(msg){
  const el=document.getElementById('pc-error');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}

function removeMember(email){
  if(email===currentUser){showPcError('自分は削除できません');return;}
  members=members.filter(m=>m!==email);
  if(isMobile) renderSpView(); else loadWeek();
}

function addMember(){
  const inp=document.getElementById('pc-member-input');
  const email=inp.value.trim().toLowerCase();
  if(!email||!email.includes('@')){showPcError('有効なメールアドレスを入力してください');return;}
  if(members.includes(email)){showPcError('既に追加されています');return;}
  members.push(email);inp.value='';
  if(isMobile) renderSpView(); else loadWeek();
}

// ── スマホ版 ──
async function renderSpView(){
  renderMiniCal();
  renderSpDateNav();
  const ds=fmtDate(selectedDate);
  document.getElementById('sp-body').innerHTML='<div class="sp-status">読み込み中...</div>';
  await fetchEvents(members,[selectedDate]);
  renderSpBody(ds);
}

function renderMiniCal(){
  const y=miniCalDate.getFullYear(), m=miniCalDate.getMonth();
  document.getElementById('mc-month-title').textContent=`${y}年${m+1}月`;
  document.getElementById('sp-month-label').textContent=`${m+1}月`;
  const grid=document.getElementById('mc-grid');
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="mc-dow">${d}</div>`).join('');
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++) html+=`<div class="mc-day other-month"></div>`;
  for(let d=1;d<=last;d++){
    const date=new Date(y,m,d);
    const ds=fmtDate(date);
    const sel=ds===fmtDate(selectedDate)?'selected':'';
    const tod=isToday(date)?'today':'';
    const hasEvt=members.some(em=>(eventsCache[em]||[]).some(e=>(e.start?.date||e.start?.dateTime?.split('T')[0])===ds));
    html+=`<div class="mc-day ${sel} ${tod} ${hasEvt?'has-event':''}" onclick="selectDate('${ds}')">
      ${d}<div class="mc-dot"></div>
    </div>`;
  }
  grid.innerHTML=html;
}

function selectDate(ds){
  selectedDate=new Date(ds+'T00:00:00');
  document.getElementById('mini-cal-wrap').classList.remove('open');
  renderSpView();
}

function renderSpDateNav(){
  const d=selectedDate;
  document.getElementById('sp-date-label').textContent=
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS_JP[d.getDay()]}）`;
}

function renderSpBody(ds){
  const body=document.getElementById('sp-body');
  body.innerHTML=members.map((email,i)=>{
    const name=email.split('@')[0];
    const ai=i%10;
    const evts=eventsForDay(email,ds);
    const evtHtml=evts.length?evts.map(e=>{
      const st=e.start?.dateTime?fmtTime(e.start.dateTime):'終日';
      const en=e.end?.dateTime?fmtTime(e.end.dateTime):'';
      const time=en?`${st}–${en}`:st;
      return `<div class="sp-event-row">
        <span class="sp-event-time">${time}</span>
        <span class="sp-event-title">${e.summary||'（無題）'}</span>
      </div>`;
    }).join(''):`<div class="sp-no-event">予定なし</div>`;
    return `<div class="sp-member-block">
      <div class="sp-member-head">
        <div class="m-avatar" style="background:${AV_BG[ai]};color:${AV_FG[ai]};width:26px;height:26px;">${name.slice(0,2).toUpperCase()}</div>
        <span class="sp-member-name">${name}</span>
      </div>
      <div class="sp-events">
        ${evtHtml}
        <button class="sp-chip-add" onclick="openModal('${email}','${ds}')">＋ 予定を追加</button>
      </div>
    </div>`;
  }).join('');
}

// ── モーダル ──
function openModal(targetEmail, dateStr){
  document.getElementById('evt-title').value='';
  document.getElementById('evt-date').value=dateStr;
  document.getElementById('evt-start').value='10:00';
  document.getElementById('evt-end').value='11:00';
  document.getElementById('evt-desc').value='';
  document.getElementById('modal-error').style.display='none';
  document.getElementById('evt-cal-checks').innerHTML=members.map(email=>{
    const name=email.split('@')[0];
    const chk=(email===targetEmail||email===currentUser)?'checked':'';
    return `<label class="cb-row">
      <input type="checkbox" value="${email}" ${chk} />
      ${name}（${email}）
    </label>`;
  }).join('');
  document.getElementById('modal-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('evt-title').focus(),50);
}

function closeModal(){document.getElementById('modal-overlay').style.display='none';}

async function saveEvent(){
  const title=document.getElementById('evt-title').value.trim();
  const date=document.getElementById('evt-date').value;
  const start=document.getElementById('evt-start').value;
  const end=document.getElementById('evt-end').value;
  const desc=document.getElementById('evt-desc').value.trim();
  const checks=Array.from(document.querySelectorAll('#evt-cal-checks input:checked')).map(c=>c.value);
  const errEl=document.getElementById('modal-error');

  if(!title){errEl.textContent='タイトルを入力してください';errEl.style.display='block';return;}
  if(!date){errEl.textContent='日付を選択してください';errEl.style.display='block';return;}
  if(checks.length===0){errEl.textContent='カレンダーを1つ以上選択してください';errEl.style.display='block';return;}

  const event={
    summary:title,description:desc,
    start:{dateTime:`${date}T${start}:00`,timeZone:'Asia/Tokyo'},
    end:{dateTime:`${date}T${end}:00`,timeZone:'Asia/Tokyo'},
  };

  closeModal();
  if(isMobile) document.getElementById('sp-body').innerHTML='<div class="sp-status">登録中...</div>';
  else setPcStatus('loading','登録中...');

  let ok=0,ng=0;
  await Promise.all(checks.map(async email=>{
    try{await gapi.client.calendar.events.insert({calendarId:email,resource:event});ok++;}
    catch(e){ng++;}
  }));

  if(ng>0&&!isMobile) showPcError(`${ok}件登録、${ng}件失敗（編集権限がないカレンダーがあります）`);
  if(isMobile) await renderSpView(); else await loadWeek();
}

// ── イベントリスナー ──
document.getElementById('signInBtn').onclick=()=>{
  if(!gapiReady||!gisReady){showAuthError('読み込み中です。しばらくお待ちください。');return;}
  tokenClient.requestAccessToken({prompt:'consent'});
};
document.getElementById('pc-signout').onclick=signOut;
document.getElementById('sp-signout').onclick=signOut;
document.getElementById('pc-prev').onclick=()=>{weekOffset--;loadWeek();};
document.getElementById('pc-next').onclick=()=>{weekOffset++;loadWeek();};
document.getElementById('pc-add-btn').onclick=()=>openModal(currentUser,fmtDate(new Date()));
document.getElementById('pc-member-add').onclick=addMember;
document.getElementById('pc-member-input').onkeydown=e=>{if(e.key==='Enter')addMember();};
document.getElementById('modal-cancel').onclick=closeModal;
document.getElementById('modal-save').onclick=saveEvent;
document.getElementById('modal-overlay').onclick=e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();};

document.getElementById('sp-cal-toggle').onclick=()=>{
  document.getElementById('mini-cal-wrap').classList.toggle('open');
};
document.getElementById('sp-prev-day').onclick=()=>{
  selectedDate.setDate(selectedDate.getDate()-1);
  miniCalDate=new Date(selectedDate);
  renderSpView();
};
document.getElementById('sp-next-day').onclick=()=>{
  selectedDate.setDate(selectedDate.getDate()+1);
  miniCalDate=new Date(selectedDate);
  renderSpView();
};
document.getElementById('sp-add-btn').onclick=()=>openModal(currentUser,fmtDate(selectedDate));
document.getElementById('mc-prev').onclick=()=>{
  miniCalDate.setMonth(miniCalDate.getMonth()-1);renderMiniCal();
};
document.getElementById('mc-next').onclick=()=>{
  miniCalDate.setMonth(miniCalDate.getMonth()+1);renderMiniCal();
};

window.openModal=openModal;
window.removeMember=removeMember;
window.selectDate=selectDate;
window.addEventListener('resize',()=>{
  if(!currentUser)return;
  const wasMobile=isMobile;detectMobile();
  if(wasMobile!==isMobile)showView();
});
</script>
<script src="https://apis.google.com/js/api.js" onload="initGapi()"></script>
<script src="https://accounts.google.com/gsi/client" onload="initGis()"></script>
